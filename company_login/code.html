<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden font-body-md">
<!-- Background Decor -->
<div class="absolute inset-0 z-0 opacity-30 pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-primary-container blur-[150px] mix-blend-screen opacity-20"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-secondary-container blur-[150px] mix-blend-screen opacity-10"></div>
</div>
<!-- Main Container -->
<main class="relative z-10 w-full max-w-md mx-auto px-margin-mobile md:px-0">
<!-- Logo Header -->
<div class="text-center mb-stack-xl">
<h1 class="font-display-lg text-headline-lg md:text-display-lg text-primary tracking-tight">AetherAR</h1>
<p class="font-label-md text-label-md text-on-surface-variant mt-stack-xs uppercase tracking-widest">Enterprise Command</p>
</div>
<!-- Login Card -->
<div class="glass-panel rounded-xl p-stack-xl shadow-2xl relative overflow-hidden group">
<!-- Inner subtle glow effect -->
<div class="absolute inset-0 bg-gradient-to-br from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500 pointer-events-none"></div>
<div class="flex items-center justify-between mb-stack-md border-b border-white/10 pb-stack-xs">
<h2 class="font-headline-md text-headline-md text-on-surface">Company Login</h2>
<span class="material-symbols-outlined text-secondary-fixed-dim" style="font-variation-settings: &#39;FILL&#39; 1;">business_center</span>
</div>
<form action="#" class="space-y-stack-md relative z-10">
<!-- Company ID Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-stack-xs" for="companyId">Company ID</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">domain</span>
<input class="w-full bg-transparent border-0 border-b border-white/20 text-on-surface font-body-md py-2 pl-10 focus:ring-0 input-glow transition-all" id="companyId" placeholder="Enter corporate designation" type="text"/>
</div>
</div>
<!-- User Email Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-stack-xs" for="email">Operative Email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">mail</span>
<input class="w-full bg-transparent border-0 border-b border-white/20 text-on-surface font-body-md py-2 pl-10 focus:ring-0 input-glow transition-all" id="email" placeholder="user@company.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<div class="flex justify-between items-center mb-stack-xs">
<label class="block font-label-md text-label-md text-on-surface-variant" for="password">Access Node</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed-dim transition-colors" href="#">Forgot Node?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant">lock</span>
<input class="w-full bg-transparent border-0 border-b border-white/20 text-on-surface font-body-md py-2 pl-10 focus:ring-0 input-glow transition-all" id="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- Action Button -->
<div class="pt-stack-md">
<button class="w-full py-3 rounded-lg font-label-md text-label-md text-primary bg-primary/10 btn-glow flex items-center justify-center gap-2" type="submit">
<span>Initiate Secure Link</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
</form>
<!-- Support Link -->
<div class="mt-stack-xl text-center">
<p class="font-label-sm text-label-sm text-on-surface-variant">
                    Require assistance? <a class="text-secondary-fixed-dim hover:text-secondary-container transition-colors" href="#">Contact Network Admin</a>
</p>
</div>
</div>
</main>
