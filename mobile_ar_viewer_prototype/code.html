<style>
        /* Custom Glassmorphism Utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glass-modal {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 30px rgba(0, 238, 252, 0.1); /* Cyan glow */
        }
        .glass-btn {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 238, 252, 0.5); /* Neon cyan border */
            box-shadow: inset 0 0 10px rgba(0, 238, 252, 0.1);
            transition: all 0.3s ease;
        }
        .glass-btn:hover {
            background: linear-gradient(135deg, rgba(0, 238, 252, 0.2), rgba(189, 0, 255, 0.2));
            box-shadow: 0 0 15px rgba(0, 238, 252, 0.4), inset 0 0 15px rgba(0, 238, 252, 0.3);
            transform: translateY(-2px);
        }
        .glass-btn-primary {
             background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(189, 0, 255, 0.8); /* Neon purple border */
            box-shadow: inset 0 0 15px rgba(189, 0, 255, 0.2), 0 0 15px rgba(189, 0, 255, 0.3);
        }
        .glass-btn-primary:hover {
             background: linear-gradient(135deg, rgba(189, 0, 255, 0.4), rgba(0, 238, 252, 0.3));
             box-shadow: 0 0 25px rgba(189, 0, 255, 0.5), inset 0 0 20px rgba(189, 0, 255, 0.4);
        }

        /* AR Reticle Animation */
        @keyframes pulse-reticle {
            0% { transform: scale(0.95) translate(-50%, -50%); opacity: 0.5; }
            50% { transform: scale(1.05) translate(-50%, -50%); opacity: 1; box-shadow: 0 0 20px rgba(0, 238, 252, 0.6); }
            100% { transform: scale(0.95) translate(-50%, -50%); opacity: 0.5; }
        }
        .ar-reticle {
            transform-origin: top left; /* Center of absolute positioning */
            animation: pulse-reticle 2s infinite ease-in-out;
        }

        /* Distance Marker Line */
        .ar-line {
            background: linear-gradient(to right, transparent, rgba(0, 238, 252, 0.8), transparent);
            height: 1px;
            box-shadow: 0 0 8px rgba(0, 238, 252, 0.5);
        }

        /* Hide scrollbar for a cleaner AR view */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
